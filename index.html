<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baymax - Your Health Care Dost</title>
  <style>
    :root {
      --baymax-white: #f9f9f9;
      --tech-cyan: #00ffcc;
      --tech-error: #ff4a4a;
      --tech-glow: rgba(0, 255, 204, 0.4);
      --bg-dark: #121620;
      --card-bg: #1b2234;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 500px;
      padding: 20px;
      text-align: center;
    }

    /* --- BAYMAX CHARACTER ART WITH BLINKING EYES --- */
    .baymax-box {
      margin-bottom: 20px;
    }
    
    .baymax-head {
      width: 120px;
      height: 80px;
      background: var(--baymax-white);
      border-radius: 50%;
      margin: 0 auto;
      position: relative;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .eyes-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 70px;
    }

    .eye {
      width: 12px;
      height: 12px;
      background: #222;
      border-radius: 50%;
      animation: blink 4s infinite ease-in-out;
    }

    .eye-line {
      flex-grow: 1;
      height: 2px;
      background: #222;
    }

    /* Eye Blinking Animation */
    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.1); }
    }

    /* --- CHAT SPLASH --- */
    .speech-bubble {
      background: #fff;
      color: #222;
      padding: 15px;
      border-radius: 15px;
      margin-top: 15px;
      font-weight: 600;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      display: inline-block;
    }

    .btn {
      background: linear-gradient(135deg, #00ffcc, #0077ff);
      border: none;
      color: #121620;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 25px;
      cursor: pointer;
      margin-top: 20px;
      box-shadow: 0 0 15px var(--tech-glow);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px var(--tech-cyan);
    }

    /* --- SCANNER SCREEN --- */
    #scanner-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
    }

    .scanner-viewport {
      position: relative;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid var(--tech-cyan);
      box-shadow: 0 0 25px var(--tech-glow);
      background: #000;
    }

    #webcam {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    .laser-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: var(--tech-cyan);
      box-shadow: 0 0 15px var(--tech-cyan);
      animation: scanMove 2s infinite ease-in-out;
    }

    .scan-status {
      margin-top: 15px;
      font-family: monospace;
      color: var(--tech-cyan);
      letter-spacing: 2px;
    }

    @keyframes scanMove {
      0% { top: 0%; }
      50% { top: 100%; }
      100% { top: 0%; }
    }

    /* --- DASHBOARD SCREEN --- */
    #dashboard-screen {
      display: none;
      width: 100%;
      margin-top: 20px;
      animation: fadeIn 1s ease-in-out;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 15px;
    }

    .card {
      background: var(--card-bg);
      border-left: 4px solid var(--tech-cyan);
      padding: 15px;
      border-radius: 8px;
      text-align: left;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .card-title {
      font-size: 12px;
      text-transform: uppercase;
      color: #8892b0;
      margin-bottom: 5px;
    }

    .card-value {
      font-size: 18px;
      font-weight: bold;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="baymax-box">
      <div class="baymax-head">
        <div class="eyes-container">
          <div class="eye"></div>
          <div class="eye-line"></div>
          <div class="eye"></div>
        </div>
      </div>
    </div>

    <div id="welcome-screen">
      <div class="speech-bubble" id="speech-text">
        Click the button below so I can introduce myself, buddy!
      </div>
      <br>
      <button class="btn" onclick="activateBaymax()">Wake Up Baymax</button>
    </div>

    <div id="scanner-screen">
      <div class="scanner-viewport">
        <video id="webcam" autoplay playsinline muted></video>
        <div class="laser-line"></div>
      </div>
      <div class="scan-status" id="status-text">ANALYZING MOLECULAR STRUCTURE...</div>
    </div>

    <div id="dashboard-screen">
      <h2 id="report-heading" style="color: var(--tech-cyan); margin-bottom: 5px;">Scan Complete! ✅</h2>
      <p style="color: #8892b0; margin-bottom: 15px;">Baymax Diagnostic Report</p>
      
      <div class="dashboard-grid" id="dashboard-data">
        </div>
      
      <br>
      <button class="btn" onclick="location.reload()">Scan Again</button>
    </div>
  </div>

  <canvas id="analyzer-canvas" style="display:none;" width="100" height="100"></canvas>

  <script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('analyzer-canvas');
    const ctx = canvas.getContext('2d');
    let streamRef = null;

    // Direct Voice synthesis setup
    function speakUp(text) {
      window.speechSynthesis.cancel(); // Stop any overlapping voices
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'hi-IN'; // Keeps a great Urdu/Hindi accent flow
      window.speechSynthesis.speak(utterance);
    }

    // Wake Up Interaction to bypass browser voice restrictions
    function activateBaymax() {
      document.getElementById('speech-text').innerText = "Hello! Main hoon aapka apna health care dost! Click below to scan your environment.";
      speakUp("Hello! Main hoon aapka apna health care dost!");
      
      // Change the button functionality to trigger the scanner
      const actionBtn = document.querySelector('.btn');
      actionBtn.innerText = "Grant Permission to Scan";
      actionBtn.setAttribute("onclick", "startRetinaScan()");
    }

    function startRetinaScan() {
      document.getElementById('welcome-screen').style.display = 'none';
      document.getElementById('scanner-screen').style.display = 'flex';
      
      speakUp("Scanning process initiated. Please look straight into the camera lens.");

      // Fire up webcam stream
      navigator.mediaDevices.getUserMedia({ video: true })
        .then((stream) => {
          streamRef = stream;
          video.srcObject = stream;
          
          // Absolute 4 second countdown processing loop
          setTimeout(() => { document.getElementById('status-text').innerText = "CALCULATING BIOMETRIC DENSITY..."; }, 1500);
          setTimeout(() => { document.getElementById('status-text').innerText = "FINALIZING DIAGNOSTIC REPORT..."; }, 3000);

          setTimeout(() => {
            analyzeFrame();
          }, 4000);
        })
        .catch((err) => {
          alert("Camera access denied! Baymax needs to see the environment.");
          location.reload();
        });
    }

    function analyzeFrame() {
      // Capture current camera video frame onto hidden canvas
      ctx.drawImage(video, 0, 0, 100, 100);
      const frameData = ctx.getImageData(0, 0, 100, 100).data;
      
      // Calculate overall color balance & brightness variations
      let totalBrightness = 0;
      let organicToneCount = 0;
      
      for(let i = 0; i < frameData.length; i += 4) {
        let r = frameData[i];
        let g = frameData[i+1];
        let b = frameData[i+2];
        
        let brightness = (r + g + b) / 3;
        totalBrightness += brightness;

        // Human skin tones/organic warmth often sit with red channels slightly higher than blue channels
        if(r > g && g > b && r > 40) {
          organicToneCount++;
        }
      }

      // Close camera tracks cleanly
      if (streamRef) {
        streamRef.getTracks().forEach(track => track.stop());
      }

      // Transition views
      document.getElementById('scanner-screen').style.display = 'none';
      document.getElementById('dashboard-screen').style.display = 'block';

      // Evaluation: Empty dark rooms or plain cold walls lack organic color signatures
      if (organicToneCount > 800) {
        displayHumanData();
      } else {
        displayNonLivingData();
      }
    }

    function displayHumanData() {
      document.getElementById('report-heading').innerText = "Organic Being Detected! ✅";
      document.getElementById('report-heading').style.color = "var(--tech-cyan)";

      const sugar = Math.floor(Math.random() * (110 - 85) + 85);
      const groups = ['A+', 'B+', 'O+', 'AB+'];
      const blood = groups[Math.floor(Math.random() * groups.length)];

      document.getElementById('dashboard-data').innerHTML = `
        <div class="card"><div class="card-title">🩸 Blood Group</div><div class="card-value">${blood}</div></div>
        <div class="card"><div class="card-title">🍬 Sugar Level</div><div class="card-value">${sugar} mg/dL</div></div>
        <div class="card"><div class="card-title">🚫 Allergies</div><div class="card-value">Dust & Peanuts</div></div>
        <div class="card"><div class="card-title">🧬 Classification</div><div class="card-value">Living Human</div></div>
        <div class="card" style="grid-column: span 2; border-left-color: #0077ff;">
          <div class="card-title">💡 Baymax Health Tip</div>
          <div class="card-value" style="font-size: 14px; font-weight: normal; line-height: 1.4;">
            Aapki organic health report normal hai buddy! Take care of yourself and drink plenty of water!
          </div>
        </div>
      `;
      speakUp("Scan complete. Organic structure verified. You are looking healthy, buddy!");
    }

    function displayNonLivingData() {
      document.getElementById('report-heading').innerText = "Scan Alert! ⚠️";
      document.getElementById('report-heading').style.color = "var(--tech-error)";

      document.getElementById('dashboard-data').innerHTML = `
        <div class="card" style="grid-column: span 2; border-left-color: var(--tech-error);">
          <div class="card-title">Target Structure Analysis</div>
          <div class="card-value">Non-Living Object Detected</div>
          <p style="margin-top: 10px; font-size: 14px; color: #8892b0; line-height:1.4;">
            Baymax diagnostic parameters failed to match any cellular skin profiles or organic warmth patterns. This item is an inanimate, non-living object!
          </p>
        </div>
      `;
      speakUp("Alert. This item is a non living object. I can only provide medical diagnostic metrics to living beings, buddy.");
    }
  </script>
</body>
</html>
