<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baymax - Your Health Care Dost!</title>
  <style>
    :root {
      --baymax-white: #f9f9f9;
      --tech-cyan: #00ffcc;
      --tech-error: #ff4a4a;
      --tech-glow: rgba(0, 255, 204, 0.4);
      --bg-dark: #121620;
      --card-bg: #1b2234;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
    body { background-color: var(--bg-dark); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
    .container { width: 100%; max-width: 500px; padding: 20px; text-align: center; }

    /* --- BAYMAX ART & ANIMATED BLINK --- */
    .baymax-box { margin-bottom: 20px; }
    .baymax-head { width: 120px; height: 80px; background: var(--baymax-white); border-radius: 50%; margin: 0 auto; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; }
    .eyes-container { display: flex; align-items: center; justify-content: space-between; width: 70px; }
    .eye { width: 12px; height: 12px; background: #222; border-radius: 50%; animation: blink 4s infinite ease-in-out; }
    .eye-line { flex-grow: 1; height: 2px; background: #222; }
    @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }

    /* --- UI ELEMENTS --- */
    .speech-bubble { background: #fff; color: #222; padding: 15px; border-radius: 15px; margin-top: 15px; font-weight: 600; box-shadow: 0 5px 15px rgba(0,0,0,0.2); display: inline-block; max-width: 90%; }
    
    .lang-select { background: var(--card-bg); color: var(--tech-cyan); border: 2px solid var(--tech-cyan); padding: 10px 20px; font-size: 16px; border-radius: 20px; outline: none; margin-top: 15px; cursor: pointer; width: 80%; text-align: center; font-weight: bold; }

    .btn { background: linear-gradient(135deg, #00ffcc, #0077ff); border: none; color: #121620; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer; margin-top: 20px; box-shadow: 0 0 15px var(--tech-glow); transition: transform 0.2s, box-shadow 0.2s; }
    .btn:hover { transform: scale(1.05); box-shadow: 0 0 25px var(--tech-cyan); }

    /* --- EMERGENCY PULSE DETECTOR INDICATOR --- */
    .mic-status { margin-top: 15px; font-size: 12px; color: #8892b0; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .pulse-dot { width: 8px; height: 8px; background-color: #555; border-radius: 50%; }
    .pulse-active { background-color: var(--tech-error); animation: pulseGlow 1.5s infinite; }
    @keyframes pulseGlow { 0% { box-shadow: 0 0 0 0 rgba(255, 74, 74, 0.7); } 70% { box-shadow: 0 0 0 8px rgba(255, 74, 74, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 74, 74, 0); } }

    /* --- SCREENS --- */
    #scanner-screen, #dashboard-screen { display: none; flex-direction: column; align-items: center; margin-top: 20px; }
    .scanner-viewport { position: relative; width: 280px; height: 280px; border-radius: 50%; overflow: hidden; border: 4px solid var(--tech-cyan); box-shadow: 0 0 25px var(--tech-glow); background: #000; }
    #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    .laser-line { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--tech-cyan); box-shadow: 0 0 15px var(--tech-cyan); animation: scanMove 2s infinite ease-in-out; }
    .scan-status { margin-top: 15px; font-family: monospace; color: var(--tech-cyan); letter-spacing: 2px; }
    @keyframes scanMove { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }

    /* --- DASHBOARD DISPLAY --- */
    #dashboard-screen { width: 100%; }
    .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
    .card { background: var(--card-bg); border-left: 4px solid var(--tech-cyan); padding: 15px; border-radius: 8px; text-align: left; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .card-title { font-size: 12px; text-transform: uppercase; color: #8892b0; margin-bottom: 5px; }
    .card-value { font-size: 17px; font-weight: bold; }
  </style>
</head>
<body>

  <div class="container">
    <!-- Baymax Head Component -->
    <div class="baymax-box">
      <div class="baymax-head">
        <div class="eyes-container">
          <div class="eye"></div>
          <div class="eye-line"></div>
          <div class="eye"></div>
        </div>
      </div>
    </div>

    <!-- 1. HOME SCREEN -->
    <div id="welcome-screen">
      <div class="speech-bubble" id="speech-text">
        Select language to wake me up!
      </div>
      <br>
      <select id="language-picker" class="lang-select">
        <option value="en">English</option>
        <option value="ur" selected>Urdu (اردو)</option>
        <option value="pnb">Punjabi (پنجابی)</option>
        <option value="zh">Chinese (中文)</option>
        <option value="ar">Arabic (العربية)</option>
        <option value="fa">Persian (فارسی)</option>
      </select>
      <br>
      <button class="btn" id="main-action-btn" onclick="activateBaymaxManual()">Wake Up Baymax</button>
      
      <div class="mic-status">
        <div class="pulse-dot" id="mic-dot"></div>
        <span id="mic-status-text">Click "Wake Up" or enable Mic to allow pain detection listener</span>
      </div>
    </div>

    <!-- 2. SCANNING SCREEN -->
    <div id="scanner-screen">
      <div class="scanner-viewport">
        <video id="webcam" autoplay playsinline muted></video>
        <div class="laser-line"></div>
      </div>
      <div class="scan-status" id="status-text">ANALYZING STRUCTURE...</div>
    </div>

    <!-- 3. HEALTH DASHBOARD RESULTS -->
    <div id="dashboard-screen">
      <h2 id="report-heading" style="color: var(--tech-cyan); margin-bottom: 5px;">Scan Complete! ✅</h2>
      <p id="report-subheading" style="color: #8892b0; margin-bottom: 15px;">Diagnostic Report</p>
      
      <div class="dashboard-grid" id="dashboard-data"></div>
      <br>
      <button class="btn" onclick="location.reload()">Reset System</button>
    </div>
  </div>

  <canvas id="analyzer-canvas" style="display:none;" width="100" height="100"></canvas>

  <script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('analyzer-canvas');
    const ctx = canvas.getContext('2d');
    let streamRef = null;
    let selectedLang = 'ur';
    let isScanningStarted = false;
    let audioContext = null;
    let audioStream = null;

    // TRANSLATION DICTIONARY FOR BAYMAX
    const translations = {
      en: {
        welcome: "Hello! Main hoon aapka apna health care dost!",
        scanPrompt: "Grant Permission to Scan",
        scanning: "Emergency triggered! Scanning process initiated. Please look straight into the camera lens.",
        status1: "ANALYZING MOLECULAR STRUCTURE...",
        status2: "FINALIZING DIAGNOSTIC REPORT...",
        humanHeading: "Organic Being Detected! ✅",
        nonLivingHeading: "Scan Alert! ⚠️",
        bloodCard: "🩸 Blood Group",
        sugarCard: "🍬 Sugar Level",
        allergyCard: "🚫 Allergies",
        classCard: "🧬 Classification",
        humanClass: "Living Human",
        normal: "(Normal)",
        allergiesVal: "Dust & Peanuts",
        tipCard: "💡 Baymax Health Tip",
        tipVal: "Aapki organic health report normal hai buddy! Take care of yourself and drink plenty of water!",
        humanVoice: "Scan complete. Organic structure verified. You are looking healthy, buddy!",
        nonLivingVal: "Non-Living Object Detected",
        nonLivingDesc: "Baymax diagnostic parameters failed to match any biological cells. This item is an inanimate object!",
        nonLivingVoice: "Alert. This item is a non living object.",
        subheading: "Baymax Diagnostic Report"
      },
      ur: {
        welcome: "ہیلو! میں ہوں آپ کا اپنا ہیلتھ کیئر دوست!",
        scanPrompt: "اسکین کرنے کی اجازت دیں",
        scanning: "ایمرجنسی اسکیننگ شروع ہو گئی ہے۔ براہ کرم کیمرے کے لینس میں سیدھا دیکھیں۔",
        status1: "مالیکیولر ساخت کا تجزیہ جاری ہے...",
        status2: "تشخیصی رپورٹ کو حتمی شکل دی جا رہی ہے...",
        humanHeading: "جاندار وجود کا پتہ چل گیا! ✅",
        nonLivingHeading: "اسکین الرٹ! ⚠️",
        bloodCard: "🩸 بلڈ گروپ",
        sugarCard: "🍬 شوگر لیول",
        allergyCard: "🚫 الرجی",
        classCard: "🧬 درجہ بندی",
        humanClass: "زندہ انسان",
        normal: "(نارمل)",
        allergiesVal: "مٹی اور مونگ پھلی",
        tipCard: "💡 ہیتھ ٹپ",
        tipVal: "آپ کی صحت کی رپورٹ بالکل نارمل ہے بڈی! اپنا خیال رکھیں اور خوب پانی پیئیں!",
        humanVoice: "اسکین مکمل ہو گیا ہے۔ آپ بالکل صحت مند لگ رہے ہیں، بڈی!",
        nonLivingVal: "بے جان چیز کا پتہ چلا ہے",
        nonLivingDesc: "بایمیکس کے تشخیصی پیرامیٹرز کسی بھی زندہ جلد سے میچ نہیں کر سکے۔",
        nonLivingVoice: "الرٹ۔ یہ ایک بے جان چیز ہے۔",
        subheading: "بایمیکس ہیلتھ رپورٹ"
      }
      // Baki languages framework load ho sakti hain upar ke parameters par
    };

    function speakUp(text, langKey) {
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = (langKey === 'ur') ? 'hi-IN' : 'en-US';
      window.speechSynthesis.speak(utterance);
    }

    // Auto-initiate audio system on window mouse click anywhere (Browser requirement)
    window.addEventListener('click', () => {
      if (!audioContext) { setupPainDetection(); }
    }, { once: true });

    // --- MIC LISTENER LOGIC (PAIN SOUND DETECTION) ---
    async function setupPainDetection() {
      try {
        audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaStreamSource(audioStream);
        const analyser = audioContext.createAnalyser();
        analyser.fftSize = 512;
        source.connect(analyser);

        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        document.getElementById('mic-dot').classList.add('pulse-active');
        document.getElementById('mic-status-text').innerText = "Pain Trigger Listener Active 🎧 (Say Uff/Ah loudly!)";

        function checkAudio() {
          if (isScanningStarted) return;
          analyser.getByteFrequencyData(dataArray);
          
          // Get average volume of sound
          let totalVolume = 0;
          for (let i = 0; i < dataArray.length; i++) {
            totalVolume += dataArray[i];
          }
          let averageVolume = totalVolume / dataArray.length;

          // If sound level crosses a sudden threshold (shouting "Ah!" or "Uff!")
          if (averageVolume > 45) { 
            console.log("Pain audio burst caught: Activation triggered!");
            triggerEmergencyScan();
          }
          requestAnimationFrame(checkAudio);
        }
        checkAudio();
      } catch (err) {
        document.getElementById('mic-status-text').innerText = "Mic access blocked. Auto pain-detection disabled.";
      }
    }

    // --- EMERGENCY AUTOMATIC ACTIVATION ---
    function triggerEmergencyScan() {
      if(isScanningStarted) return;
      isScanningStarted = true;
      
      // Select whatever language is currently selected in dropdown automatically
      selectedLang = document.getElementById('language-picker').value;
      if(!translations[selectedLang]) selectedLang = 'en'; // fallback to en if translation array short

      // Close the microphone tracking streams cleanly
      if (audioStream) { audioStream.getTracks().forEach(t => t.stop()); }
      
      startRetinaScan();
    }

    // --- MANUAL BUTTON WAKEUP FEATURE ---
    function activateBaymaxManual() {
      selectedLang = document.getElementById('language-picker').value;
      if(!translations[selectedLang]) selectedLang = 'en';
      
      const t = translations[selectedLang];
      document.getElementById('speech-text').innerText = t.welcome;
      speakUp(t.welcome, selectedLang);
      
      const actionBtn = document.getElementById('main-action-btn');
      actionBtn.innerText = t.scanPrompt;
      actionBtn.setAttribute("onclick", "startRetinaScan()");
    }

    // --- SCANNER SYSTEM ---
    function startRetinaScan() {
      isScanningStarted = true;
      const t = translations[selectedLang] || translations['en'];
      
      document.getElementById('welcome-screen').style.display = 'none';
      document.getElementById('scanner-screen').style.display = 'flex';
      document.getElementById('status-text').innerText = t.status1;
      
      speakUp(t.scanning, selectedLang);

      navigator.mediaDevices.getUserMedia({ video: true })
        .then((stream) => {
          streamRef = stream;
          video.srcObject = stream;
          setTimeout(() => { document.getElementById('status-text').innerText = t.status2; }, 2000);
          setTimeout(() => { analyzeFrame(); }, 4000);
        })
        .catch((err) => {
          alert("Camera required for scanning features.");
          location.reload();
        });
    }

    function analyzeFrame() {
      ctx.drawImage(video, 0, 0, 100, 100);
      const frameData = ctx.getImageData(0, 0, 100, 100).data;
      
      let organicToneCount = 0;
      for(let i = 0; i < frameData.length; i += 4) {
        let r = frameData[i]; let g = frameData[i+1]; let b = frameData[i+2];
        if(r > g && g > b && r > 40) { organicToneCount++; }
      }

      if (streamRef) { streamRef.getTracks().forEach(track => track.stop()); }

      document.getElementById('scanner-screen').style.display = 'none';
      document.getElementById('dashboard-screen').style.display = 'block';

      if (organicToneCount > 800) { displayHumanData(); } else { displayNonLivingData(); }
    }

    function displayHumanData() {
      const t = translations[selectedLang] || translations['en'];
      document.getElementById('report-heading').innerText = t.humanHeading;
      document.getElementById('report-heading').style.color = "var(--tech-cyan)";
      
      const sugar = Math.floor(Math.random() * (110 - 85) + 85);
      const groups = ['A+', 'B+', 'O+', 'AB+'];
      const blood = groups[Math.floor(Math.random() * groups.length)];

      document.getElementById('dashboard-data').innerHTML = `
        <div class="card"><div class="card-title">${t.bloodCard}</div><div class="card-value">${blood}</div></div>
        <div class="card"><div class="card-title">${t.sugarCard}</div><div class="card-value">${sugar} mg/dL</div></div>
        <div class="card"><div class="card-title">${t.allergyCard}</div><div class="card-value">${t.allergiesVal}</div></div>
        <div class="card"><div class="card-title">${t.classCard}</div><div class="card-value">${t.humanClass}</div></div>
        <div class="card" style="grid-column: span 2; border-left-color: #0077ff;">
          <div class="card-title">${t.tipCard}</div>
          <div class="card-value" style="font-size: 14px; font-weight: normal;">${t.tipVal}</div>
        </div>
      `;
      speakUp(t.humanVoice, selectedLang);
    }

    function displayNonLivingData() {
      const t = translations[selectedLang] || translations['en'];
      document.getElementById('report-heading').innerText = t.nonLivingHeading;
      document.getElementById('report-heading').style.color = "var(--tech-error)";

      document.getElementById('dashboard-data').innerHTML = `
        <div class="card" style="grid-column: span 2; border-left-color: var(--tech-error);">
          <div class="card-title">${t.classCard}</div>
          <div class="card-value">${t.nonLivingVal}</div>
          <p style="margin-top: 10px; font-size: 14px; color: #8892b0;">${t.nonLivingDesc}</p>
        </div>
      `;
      speakUp(t.nonLivingVoice, selectedLang);
    }
  </script>
</body>
</html>
